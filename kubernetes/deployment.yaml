apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-ecommerce

  template:
    metadata:
      labels:
        app: flask-ecommerce

    spec:
      containers:
      - name: flask-ecommerce

        image: vishwasgm29/flask-ecommerce:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
